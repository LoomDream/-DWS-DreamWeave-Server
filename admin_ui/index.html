<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dreamweave Admin</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f7;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --text: #111827;
      --muted: #64748b;
      --line: #d9e2ef;
      --accent: #2563eb;
      --accent-2: #14b8a6;
      --accent-soft: #e8f1ff;
      --ok: #047857;
      --bad: #b42318;
      --warn: #b7791f;
      --shadow: 0 16px 40px rgba(15, 23, 42, .08);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .shell { display: grid; grid-template-columns: 264px 1fr; min-height: 100vh; }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 18px 14px;
      background: #0f172a;
      color: #dbeafe;
    }
    .brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 18px; }
    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, #2563eb, #14b8a6);
      color: #fff;
      font-weight: 800;
    }
    .brand-title { font-size: 15px; font-weight: 800; color: #fff; }
    .brand-subtitle { font-size: 12px; color: #93a4bc; }
    .nav { display: grid; gap: 6px; }
    .nav button {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      background: transparent;
      color: #cbd5e1;
      text-align: left;
    }
    .nav button:hover { background: rgba(148, 163, 184, .12); color: #fff; }
    .nav button.active { background: #1d4ed8; color: #fff; }
    .nav .icon { width: 22px; text-align: center; opacity: .9; }
    .sidebar-footer {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      padding: 12px;
      border: 1px solid rgba(148, 163, 184, .18);
      border-radius: 8px;
      color: #93a4bc;
      background: rgba(15, 23, 42, .5);
      font-size: 12px;
    }
    .main { min-width: 0; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 66px;
      padding: 14px 22px;
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }
    .title h1 { margin: 0; font-size: 20px; letter-spacing: 0; }
    .title p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .content { padding: 22px; }
    section { display: none; }
    section.active { display: block; }
    .grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .layout-2 { display: grid; grid-template-columns: minmax(280px, 360px) 1fr; gap: 14px; align-items: start; }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card-title { margin: 0; font-size: 15px; font-weight: 800; }
    .card-desc { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
    .stat { min-height: 92px; }
    .stat .label { color: var(--muted); font-size: 12px; }
    .stat .value { margin-top: 8px; font-size: 19px; font-weight: 800; overflow-wrap: anywhere; }
    .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .stack { display: grid; gap: 10px; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    input, select, textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, .12); }
    textarea {
      min-height: 260px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      line-height: 1.45;
    }
    .input-sm { width: 112px; }
    .input-md { width: 220px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 8px 12px;
      min-height: 38px;
      white-space: nowrap;
    }
    .btn:hover { border-color: #b8c5d8; background: #f8fafc; }
    .btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .btn.danger { border-color: #fecaca; background: #fff5f5; color: var(--bad); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 9px;
      background: var(--surface-2);
      color: var(--muted);
      border: 1px solid var(--line);
      font-size: 12px;
      white-space: nowrap;
    }
    .badge.ok { color: var(--ok); background: #ecfdf5; border-color: #bbf7d0; }
    .badge.bad { color: var(--bad); background: #fff1f2; border-color: #fecdd3; }
    .badge.warn { color: var(--warn); background: #fffbeb; border-color: #fde68a; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
      padding: 12px;
    }
    .list { display: grid; gap: 8px; }
    .item {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      text-align: left;
    }
    .item:hover, .item.active { border-color: var(--accent); background: var(--accent-soft); }
    .item-title { font-weight: 800; overflow-wrap: anywhere; }
    .item-meta { margin-top: 3px; color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 10px; text-align: left; vertical-align: top; }
    th { background: #f1f5f9; font-size: 12px; color: #475569; }
    tr:last-child td { border-bottom: 0; }
    pre { margin: 0; white-space: pre-wrap; overflow-wrap: anywhere; font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; }
    .muted { color: var(--muted); }
    .message { min-height: 20px; color: var(--muted); font-size: 12px; }
    .empty { color: var(--muted); text-align: center; padding: 24px 12px; border: 1px dashed var(--line); border-radius: 8px; background: #fff; }
    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .sidebar-footer { position: static; margin-top: 12px; }
      .nav { grid-template-columns: repeat(2, 1fr); }
      .topbar { position: static; align-items: flex-start; flex-direction: column; }
      .layout-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .content { padding: 14px; }
      .nav { grid-template-columns: 1fr; }
      .split { grid-template-columns: 1fr; }
      .input-sm, .input-md { width: 100%; }
      .toolbar { align-items: stretch; }
      .toolbar .btn, .toolbar input, .toolbar select { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">DW</div>
        <div>
          <div class="brand-title">Dreamweave</div>
          <div class="brand-subtitle" data-i18n="brand_subtitle"></div>
        </div>
      </div>
      <nav class="nav">
        <button data-tab="dashboard" class="active"><span class="icon">01</span><span data-i18n="nav_dashboard"></span></button>
        <button data-tab="endpoints"><span class="icon">02</span><span data-i18n="nav_endpoints"></span></button>
        <button data-tab="logs"><span class="icon">03</span><span data-i18n="nav_logs"></span></button>
        <button data-tab="stories"><span class="icon">04</span><span data-i18n="nav_stories"></span></button>
        <button data-tab="sql"><span class="icon">05</span><span data-i18n="nav_sql"></span></button>
      </nav>
      <div class="sidebar-footer">
        <div data-i18n="sidebar_hint"></div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="title">
          <h1 data-i18n="page_title"></h1>
          <p data-i18n="page_subtitle"></p>
        </div>
        <div class="top-actions">
          <span id="authState" class="badge warn"></span>
          <select id="language" class="input-sm" aria-label="Language">
            <option value="zh-CN">中文</option>
            <option value="en-US">English</option>
            <option value="ja-JP">日本語</option>
            <option value="ru-RU">Русский</option>
          </select>
          <a class="btn" href="/docs" target="_blank" data-i18n="docs"></a>
          <a class="btn" href="/swagger" target="_blank">Swagger</a>
        </div>
      </header>

      <main class="content">
        <section id="dashboard" class="active">
          <div class="grid">
            <div class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title" data-i18n="auth_title"></h2>
                  <p class="card-desc" data-i18n="auth_desc"></p>
                </div>
              </div>
              <div class="toolbar">
                <input id="token" type="password" placeholder="Admin Token">
                <button class="btn primary" onclick="login()" data-i18n="verify"></button>
                <button class="btn" onclick="loadAll()" data-i18n="refresh_all"></button>
              </div>
              <div id="loginMessage" class="message"></div>
            </div>
            <div class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title" data-i18n="quick_links"></h2>
                  <p class="card-desc" data-i18n="quick_links_desc"></p>
                </div>
              </div>
              <div class="grid">
                <a class="btn" href="/docs" target="_blank">/docs</a>
                <a class="btn" href="/swagger" target="_blank">/swagger</a>
                <a class="btn" href="/openapi.json" target="_blank">/openapi.json</a>
              </div>
            </div>
          </div>
          <div id="meta" class="grid" style="margin-top:14px"></div>
        </section>

        <section id="endpoints">
          <div class="layout-2">
            <div class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title" data-i18n="endpoint_list"></h2>
                  <p class="card-desc" data-i18n="endpoint_list_desc"></p>
                </div>
                <button class="btn" onclick="loadEndpoints()" data-i18n="refresh"></button>
              </div>
              <div id="endpointList" class="list"></div>
            </div>
            <div class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title" data-i18n="endpoint_test"></h2>
                  <p class="card-desc" data-i18n="endpoint_test_desc"></p>
                </div>
              </div>
              <div class="toolbar">
                <select id="testMethod" class="input-sm">
                  <option>GET</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option>
                </select>
                <input id="testPath" class="input-md" placeholder="/admin/api/meta">
                <button class="btn primary" onclick="runEndpointTest()" data-i18n="send"></button>
              </div>
              <div class="stack">
                <label class="muted">Headers JSON</label>
                <textarea id="testHeaders" style="min-height:96px">{}</textarea>
                <label class="muted" data-i18n="body_json"></label>
                <textarea id="testBody" style="min-height:136px"></textarea>
                <div id="endpointDetail" class="panel"></div>
                <pre id="testResult" class="panel"></pre>
              </div>
            </div>
          </div>
        </section>

        <section id="logs">
          <div class="card">
            <div class="card-header">
              <div>
                <h2 class="card-title" data-i18n="logs_title"></h2>
                <p class="card-desc" data-i18n="logs_desc"></p>
              </div>
              <div class="toolbar">
                <input id="logLimit" class="input-sm" type="number" value="100" min="1" max="500">
                <button class="btn" onclick="loadLogs()" data-i18n="refresh"></button>
              </div>
            </div>
            <div id="logsTable"></div>
          </div>
        </section>

        <section id="stories">
          <div class="layout-2">
            <div class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title" data-i18n="story_files"></h2>
                  <p class="card-desc" data-i18n="story_files_desc"></p>
                </div>
                <button class="btn" onclick="loadScenes()" data-i18n="refresh"></button>
              </div>
              <div class="stack">
                <div class="split">
                  <input id="newChapter" type="number" min="1" value="1" data-i18n-placeholder="chapter">
                  <input id="newAct" type="number" min="1" value="1" data-i18n-placeholder="act">
                </div>
                <input id="newChapterTitle" data-i18n-placeholder="chapter_title">
                <input id="newSceneTitle" data-i18n-placeholder="scene_title">
                <button class="btn primary" onclick="createScene()" data-i18n="create_story"></button>
                <div id="sceneList" class="list"></div>
              </div>
            </div>
            <div class="card">
              <div class="card-header">
                <div>
                  <h2 id="sceneEditorTitle" class="card-title" data-i18n="story_editor"></h2>
                  <p class="card-desc" data-i18n="story_editor_desc"></p>
                </div>
                <div class="toolbar">
                  <button class="btn primary" onclick="saveScene()" data-i18n="save"></button>
                  <button class="btn" onclick="formatSceneJson()" data-i18n="format_json"></button>
                </div>
              </div>
              <textarea id="sceneText"></textarea>
              <div id="sceneMessage" class="message"></div>
            </div>
          </div>
        </section>

        <section id="sql">
          <div class="layout-2">
            <div class="card">
              <div class="card-header">
                <div>
                  <h2 class="card-title" data-i18n="tables_title"></h2>
                  <p class="card-desc" data-i18n="tables_desc"></p>
                </div>
                <button class="btn" onclick="loadTables()" data-i18n="refresh"></button>
              </div>
              <div id="tables" class="list"></div>
            </div>
            <div class="card">
              <div class="card-header">
                <div>
                  <h2 id="tableTitle" class="card-title" data-i18n="table_data"></h2>
                  <p class="card-desc" data-i18n="table_data_desc"></p>
                </div>
                <div class="toolbar">
                  <input id="rowLimit" class="input-sm" type="number" min="1" max="500" value="100">
                  <input id="rowOffset" class="input-sm" type="number" min="0" value="0">
                  <button class="btn" onclick="loadSelectedTable()" data-i18n="read"></button>
                </div>
              </div>
              <div id="schemaView" style="margin-bottom:12px"></div>
              <div id="rowView"></div>
            </div>
          </div>
          <div class="card" style="margin-top:14px">
            <div class="card-header">
              <div>
                <h2 class="card-title" data-i18n="sql_runner"></h2>
                <p class="card-desc" data-i18n="sql_runner_desc"></p>
              </div>
            </div>
            <textarea id="sqlText">SELECT name FROM sqlite_master WHERE type = 'table'</textarea>
            <div class="toolbar" style="margin-top:10px">
              <button class="btn primary" onclick="runSql(false)" data-i18n="readonly_query"></button>
              <button class="btn danger" onclick="runSql(true)" data-i18n="execute_write"></button>
            </div>
            <div id="sqlResult" style="margin-top:12px"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

    let lang = localStorage.getItem('dw_admin_lang') || 'zh-CN';
    let token = localStorage.getItem('dw_admin_token') || '';
    let endpoints = [];
    let selectedScene = '';
    let selectedTable = '';

    const tabs = document.querySelectorAll('.nav button');
    tabs.forEach(btn => btn.addEventListener('click', () => {
      tabs.forEach(item => item.classList.remove('active'));
      document.querySelectorAll('section').forEach(item => item.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    }));

    document.getElementById('language').value = lang;
    document.getElementById('language').addEventListener('change', async event => {
      lang = event.target.value;
      localStorage.setItem('dw_admin_lang', lang);
      applyI18n();
      if (token) await loadEndpoints();
    });
    document.getElementById('token').value = token;

    function t(key) { return (I18N[lang] || I18N['zh-CN'])[key] || I18N['zh-CN'][key] || key; }

    function applyI18n() {
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(node => node.textContent = t(node.dataset.i18n));
      document.querySelectorAll('[data-i18n-placeholder]').forEach(node => node.placeholder = t(node.dataset.i18nPlaceholder));
      setAuthState(token ? 'ok' : 'warn', token ? t('auth_ok') : t('auth_pending'));
      if (!selectedTable) document.getElementById('tableTitle').textContent = t('table_data');
      if (!selectedScene) document.getElementById('sceneEditorTitle').textContent = t('story_editor');
    }

    function headers() { return {'Content-Type': 'application/json', 'X-Admin-Token': token}; }

    async function api(path, options = {}) {
      const response = await fetch(path, {...options, headers: {...headers(), ...(options.headers || {})}});
      const data = await response.json();
      if (!response.ok || data.ok === false) throw new Error(data.detail || data.error?.message || 'request failed');
      return data.payload;
    }

    async function login() {
      token = document.getElementById('token').value.trim();
      try {
        const payload = await api('/admin/api/auth', {method: 'POST', body: JSON.stringify({token})});
        localStorage.setItem('dw_admin_token', token);
        document.cookie = 'dw_admin_token=' + encodeURIComponent(token) + '; SameSite=Lax; Path=/';
        setAuthState('ok', t('auth_ok'));
        document.getElementById('loginMessage').textContent = t('token_valid');
        renderMeta(payload);
        await loadAll();
      } catch (error) {
        setAuthState('bad', t('auth_fail'));
        document.getElementById('loginMessage').textContent = error.message;
      }
    }

    function setAuthState(kind, text) {
      const node = document.getElementById('authState');
      node.textContent = text;
      node.className = 'badge ' + kind;
    }

    async function loadAll() {
      await Promise.allSettled([loadMeta(), loadEndpoints(), loadLogs(), loadScenes(), loadTables()]);
    }

    async function loadMeta() { renderMeta(await api('/admin/api/meta')); }

    function renderMeta(meta) {
      const order = ['server_name', 'server_version', 'api_version', 'protocol_version', 'panel_version', 'environment', 'region', 'database', 'story_dir'];
      const entries = order.filter(key => key in meta).map(key => [key, meta[key]]);
      document.getElementById('meta').innerHTML = entries.map(([key, value]) => `
        <div class="card stat">
          <div class="label">${escapeHtml(key)}</div>
          <div class="value">${escapeHtml(String(value))}</div>
        </div>
      `).join('');
    }

    async function loadEndpoints() {
      endpoints = (await api('/admin/api/endpoints?lang=' + encodeURIComponent(lang))).endpoints;
      document.getElementById('endpointList').innerHTML = endpoints.map((item, index) => `
        <button class="item" onclick="selectEndpoint(${index})">
          <div class="item-title">${escapeHtml(item.method)} ${escapeHtml(item.path)}</div>
          <div class="item-meta">${escapeHtml(item.auth)}</div>
        </button>
      `).join('') || empty(t('no_rows'));
      if (endpoints.length && !document.getElementById('testPath').value) selectEndpoint(0);
    }

    function selectEndpoint(index) {
      const item = endpoints[index];
      document.getElementById('testMethod').value = item.method;
      document.getElementById('testPath').value = item.path.replace(/\{[^}]+\}/g, '1');
      document.getElementById('endpointDetail').innerHTML = `
        <div class="item-title">${escapeHtml(item.method)} ${escapeHtml(item.path)}</div>
        <div class="item-meta">${escapeHtml(t('auth_label'))}: ${escapeHtml(item.auth)}</div>
        <p>${escapeHtml(item.description || '')}</p>
      `;
    }

    async function runEndpointTest() {
      try {
        const rawHeaders = document.getElementById('testHeaders').value.trim() || '{}';
        const rawBody = document.getElementById('testBody').value.trim();
        const method = document.getElementById('testMethod').value;
        const requestHeaders = {...JSON.parse(rawHeaders)};
        requestHeaders['X-Admin-Token'] = requestHeaders['X-Admin-Token'] || token;
        if (rawBody && !requestHeaders['Content-Type']) requestHeaders['Content-Type'] = 'application/json';
        const response = await fetch(document.getElementById('testPath').value, {
          method,
          headers: requestHeaders,
          body: ['GET', 'HEAD'].includes(method) ? undefined : rawBody,
        });
        const text = await response.text();
        let body;
        try { body = JSON.parse(text); } catch (_) { body = text; }
        document.getElementById('testResult').textContent = JSON.stringify({
          status_code: response.status,
          headers: Object.fromEntries(response.headers.entries()),
          body,
        }, null, 2);
      } catch (error) {
        document.getElementById('testResult').textContent = error.message;
      }
    }

    async function loadLogs() {
      const limit = document.getElementById('logLimit').value || 100;
      document.getElementById('logsTable').innerHTML = table((await api('/admin/api/logs?limit=' + encodeURIComponent(limit))).logs);
    }

    async function loadScenes() {
      const payload = await api('/admin/api/story/scenes');
      document.getElementById('sceneList').innerHTML = payload.scenes.map(scene => `
        <button class="item ${scene.file === selectedScene ? 'active' : ''}" onclick="loadScene('${escapeAttr(scene.file)}')">
          <div class="item-title">${escapeHtml(scene.file)}</div>
          <div>${escapeHtml(scene.meta.chapter_title)} / ${escapeHtml(scene.meta.scene_title)}</div>
          <div class="item-meta">md5=${escapeHtml(scene.md5)}</div>
        </button>
      `).join('') || empty(t('no_scenes'));
    }

    async function createScene() {
      const payload = await api('/admin/api/story/scenes', {
        method: 'POST',
        body: JSON.stringify({
          chapter: Number(document.getElementById('newChapter').value || 1),
          act: Number(document.getElementById('newAct').value || 1),
          chapter_title: document.getElementById('newChapterTitle').value,
          scene_title: document.getElementById('newSceneTitle').value,
        }),
      });
      selectedScene = payload.file;
      document.getElementById('sceneText').value = JSON.stringify(payload.content, null, 2);
      document.getElementById('sceneEditorTitle').textContent = `${t('story_editor')}: ${payload.file}`;
      document.getElementById('sceneMessage').textContent = `${t('created')} ${payload.path}`;
      await loadScenes();
    }

    async function loadScene(file) {
      selectedScene = file;
      const payload = await api('/admin/api/story/scenes/' + encodeURIComponent(file));
      document.getElementById('sceneText').value = JSON.stringify(payload.content, null, 2);
      document.getElementById('sceneEditorTitle').textContent = `${t('story_editor')}: ${payload.file}`;
      document.getElementById('sceneMessage').textContent = `${payload.path} md5=${payload.md5}`;
      await loadScenes();
    }

    async function saveScene() {
      if (!selectedScene) throw new Error(t('select_story_first'));
      const content = JSON.parse(document.getElementById('sceneText').value);
      const payload = await api('/admin/api/story/scenes/' + encodeURIComponent(selectedScene), {
        method: 'PUT',
        body: JSON.stringify({content}),
      });
      document.getElementById('sceneMessage').textContent = `${t('saved')} ${payload.path} md5=${payload.md5}`;
      await loadScenes();
    }

    function formatSceneJson() {
      document.getElementById('sceneText').value = JSON.stringify(JSON.parse(document.getElementById('sceneText').value), null, 2);
    }

    async function loadTables() {
      const payload = await api('/admin/api/sql/tables');
      document.getElementById('tables').innerHTML = payload.tables.map(name => `
        <button class="item" onclick="selectTable('${escapeAttr(name)}')">
          <div class="item-title">${escapeHtml(name)}</div>
        </button>
      `).join('') || empty(t('no_tables'));
    }

    async function selectTable(name) {
      selectedTable = name;
      await loadSelectedTable();
    }

    async function loadSelectedTable() {
      if (!selectedTable) return;
      document.getElementById('tableTitle').textContent = `${t('table_data')}: ${selectedTable}`;
      const limit = document.getElementById('rowLimit').value || 100;
      const offset = document.getElementById('rowOffset').value || 0;
      const [schema, rows] = await Promise.all([
        api('/admin/api/sql/tables/' + encodeURIComponent(selectedTable) + '/schema'),
        api('/admin/api/sql/tables/' + encodeURIComponent(selectedTable) + '/rows?limit=' + encodeURIComponent(limit) + '&offset=' + encodeURIComponent(offset)),
      ]);
      document.getElementById('schemaView').innerHTML = table(schema.columns);
      document.getElementById('rowView').innerHTML = table(rowsToObjects(rows));
    }

    async function runSql(write) {
      try {
        const payload = await api('/admin/api/sql/query', {
          method: 'POST',
          body: JSON.stringify({sql: document.getElementById('sqlText').value, write}),
        });
        const rows = rowsToObjects(payload);
        document.getElementById('sqlResult').innerHTML = rows.length ? table(rows) : `<div class="panel">affected_rows=${payload.affected_rows ?? 0}</div>`;
        await loadTables();
      } catch (error) {
        document.getElementById('sqlResult').innerHTML = `<div class="panel"><span class="badge bad">${escapeHtml(error.message)}</span></div>`;
      }
    }

    function rowsToObjects(payload) {
      return (payload.rows || []).map(row => Object.fromEntries((payload.columns || []).map((col, index) => [col, row[index]])));
    }

    function table(rows) {
      if (!rows || !rows.length) return empty(t('no_rows'));
      const cols = Object.keys(rows[0]);
      return `<table><thead><tr>${cols.map(col => `<th>${escapeHtml(col)}</th>`).join('')}</tr></thead><tbody>${
        rows.map(row => `<tr>${cols.map(col => `<td><pre>${escapeHtml(formatCell(row[col]))}</pre></td>`).join('')}</tr>`).join('')
      }</tbody></table>`;
    }

    function empty(text) { return `<div class="empty">${escapeHtml(text)}</div>`; }
    function formatCell(value) {
      if (value === null || value === undefined) return '';
      if (typeof value === 'object') return JSON.stringify(value);
      return String(value);
    }
    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
    }
    function escapeAttr(text) { return escapeHtml(String(text)).replace(/`/g, '&#96;'); }

    applyI18n();
    if (token) login();
  </script>
</body>
</html>
