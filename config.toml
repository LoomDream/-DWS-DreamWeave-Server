[server]
host = "0.0.0.0"
port = 7777
version = "0.1.5"
motd = "Dreamweave alpha server"
environment = "development"
region = "local"
server_name = "Dreamweave Alpha"

[version]
minimum_client_version = "0.1.5"
recommended_client_version = "0.1.5"
protocol_version = "2026.06"
api_revision = "3"
update_required = false
download_url = ""
release_notes_url = ""

[admin]
enabled = true
panel_version = "0.1.5"
# Development default only. Outside development, set a non-sample value here
# or provide DREAMWEAVE_ADMIN_TOKEN.
token = "change-me-dreamweave-admin-token"
max_sql_rows = 200

[security]
# Development defaults only. Outside development, set non-sample values here
# or provide DREAMWEAVE_SERVER_SECRET and DREAMWEAVE_DEVELOPER_SECRET.
server_secret = "change-me-dreamweave-server-secret"
developer_secret = "change-me-dreamweave-developer-secret"
session_token_ttl_seconds = 86400
handshake_ttl_seconds = 300

[cookies]
secure = false
samesite = "lax"
domain = ""
handshake_cookie = "dw_handshake"
session_cookie = "dw_session"

[cors]
enabled = true
allow_origins = [
  "http://localhost:3000",
  "http://127.0.0.1:3000",
  "http://localhost:5173",
  "http://127.0.0.1:5173",
  "http://localhost:7776",
  "http://127.0.0.1:7776",
  "http://localhost:7777",
  "http://127.0.0.1:7777",
]
allow_origin_regex = "^https?://(localhost|127\\.0\\.0\\.1)(:\\d+)?$"
allow_credentials = true
allow_methods = ["GET", "POST", "PUT", "OPTIONS"]
allow_headers = ["*"]
expose_headers = []
max_age = 600

[status]
public_message = "Dreamweave server is online."
maintenance = false
maintenance_message = ""
allow_registration = true
allow_login = true
allow_sync = true
allow_content_download = true
max_players = 100
status_components = ["api", "database", "content", "auth"]

[database]
path = "dreamweave.sqlite3"

[content]
story_file = "content/story.json"
story_dir = "story"
audio_dir = "wav/story"
seed_dir = "seed/map"

[legal]
terms_file = "content/legal/terms.md"
privacy_file = "content/legal/privacy.md"
eula_file = "content/legal/eula.md"
terms_dir = "content/legal/terms"
privacy_dir = "content/legal/privacy"
eula_dir = "content/legal/eula"
default_language = "zh-CN"
fallback_languages = ["zh-CN", "en-US", "ja-JP", "ru-RU"]
